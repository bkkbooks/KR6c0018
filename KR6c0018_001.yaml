body:
  text: 大域龍菩薩造西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫臣施護等奉詔譯歸命妙吉祥童真菩薩摩訶薩等般若等成就無二智如來彼中義相應彼聲教道二依止及作用事業同起修分別相及罪稱讚如次説具信以為體師資互證説説時説處等得自量成就説法者應知世間時處二説者有同證然後得如量一切如是集我聞等所説和合如是義最上三十二分別十六相空如其次第八千頌中説了異方便説今此八千頌如説義無減隨所樂頌略如是義如説菩薩我不見此説實寂默能受內諸事彼説即為空色及色自性此説亦復空此等外諸處所受分皆止色等相彼身安住及相離向義若彼見彼內即無實彼諸內空性自性亦復空所有識相種即起我悲智不生亦不滅有情此等明有情生死欲彼説即為空佛法不可見菩薩法亦然此等如所説空彼十力等別別所有法此説遍計性彼勝義非有諸法如是説彼我等見斷大士畢竟作而彼人無我佛一切處説一切法不生此所説亦然宣説法無我一切處實説有罪及無罪不增亦不減諸有為無為所有諸善止諸善空性中彼出亦無盡此遍計分別彼普攝為空十種心散亂心散亂異處愚不得相應無二智不成彼止息互相為能所對治於般若教中彼圓集所説若有菩薩有此無相分別散亂止息師説彼世俗蘊此八千頌等從初語次第至了畢皆止説無相分別因言不如是此唯説事相梵網等經中知一切如理菩薩我不見而此等廣大世尊此止遣有相分別亂若不見彼名境界行亦然彼蘊一切處皆不見菩薩此止遣遍計普攝此所説乘一切智因慧分別諸相般若波羅蜜説三種依止謂遍計依他及圓成實性無此等説句一切遍計止幻喻等見邊此説依他性有四種清淨説圓成實性般若波羅蜜佛無別異説十分別散亂對治如次説此三種知已若即若離説如初語圓成依他及遍計無相分別色彼散亂止遣彼佛亦菩提不見説者等至了畢此知止遣遍計性自性空彼色俱相何所有此別異語中了知已彼止此不空故空如是語所説諸毀謗分別一切説皆止如幻亦然佛彼如夢亦然如是如次知智語邊決定諸同等所作此説佛如幻幻喻等言等此説依他性若諸異生智彼自性清淨故説彼佛言菩薩亦如佛自性自色覆彼無明因作如幻別異現果如夢棄捨無二別異説果等定毀謗毀謗諸分別彼毀謗此説色空非和合彼互相違礙無色無空名色相自和合此一性分別對治種種性空不異彼色彼空何所有此無實所現彼無明所起此無實能表彼説無明故此如是説色般若波羅蜜無二二如是二分別對治如理言淨性亦然不可得性無性違等種種性定見説此色唯名真實無自性彼自性分別容受即當止色及色自性空如先所説彼自性俱相分別此止遣不生不滅等所有諸法觀佛言若散異彼差別分別虛假名言等彼法若分別聲義二非合彼非自性意般若波羅蜜佛菩薩亦然此所説唯名離實義分別所有聲義止此非事止遣如是餘亦知語中義決定此無所得正一切名實知如義性如是不止遣彼聲須菩提二離聲聲義如是菩薩無有名我見此有説般若波羅蜜語無決定生伺察唯智者此義微妙慧相續義除遣若別義分別般若波羅蜜彼言説如響總略如是義般若等依止如是義循環復別義依止般若波羅蜜正攝八千頌彼所得福蘊皆從般若生
